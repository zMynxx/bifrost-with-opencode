receivers:
  otlp:
    protocols:
      grpc:
        endpoint: ${env:OTLP_GRPC_ENDPOINT}
      http:
        endpoint: ${env:OTLP_HTTP_ENDPOINT}

exporters:
  # ClickHouse exporter for durable telemetry storage
  clickhouse:
    endpoint: ${env:CLICKHOUSE_ENDPOINT}
    username: ${env:CLICKHOUSE_USERNAME}
    password: ${env:CLICKHOUSE_PASSWORD}
    database: ${env:CLICKHOUSE_DATABASE}
    ttl: 72h
    traces_table_name: otel_traces
    metrics_table_name: otel_metrics
    logs_table_name: otel_logs
    timeout: 5s
    sending_queue:
      queue_size: 100
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  # Debug output to verify data is flowing
  debug:
    verbosity: basic

processors:
  batch:
    timeout: ${env:OTEL_BATCH_TIMEOUT}
    send_batch_size: ${env:OTEL_BATCH_SEND_SIZE}
  memory_limiter:
    check_interval: 1s
    limit_mib: ${env:OTEL_MEMORY_LIMIT_MIB}
    spike_limit_mib: ${env:OTEL_SPIKE_LIMIT_MIB}

extensions:
  health_check:
    endpoint: ${env:OTEL_COLLECTOR_HEALTH_ENDPOINT}
  pprof:
    endpoint: ${env:OTEL_COLLECTOR_PPROF_ENDPOINT}

service:
  extensions: [health_check, pprof]
  telemetry:
    logs:
      level: ${env:OTEL_LOG_LEVEL}
    metrics:
      level: ${env:OTEL_METRICS_LEVEL}
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, clickhouse]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, clickhouse]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, clickhouse]

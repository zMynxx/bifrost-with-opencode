services:
  # ─────────────────────────────────────────────
  # Bifrost AI Gateway
  # ─────────────────────────────────────────────
  bifrost:
    image: maximhq/bifrost:latest
    container_name: bifrost
    ports:
      - "8080:8080"          # Gateway HTTP API + Web UI
    volumes:
      - ./bifrost/config.json:/app/data/config.json
      - bifrost-data:/app/data   # Persists logs.db, config.db
    environment:
      - APP_PORT=8080
      - APP_HOST=0.0.0.0
      - LOG_LEVEL=info
      - LOG_STYLE=pretty
    env_file:
      - ./bifrost/.env
    depends_on:
      otel-collector:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────
  # OpenTelemetry Collector (contrib)
  #  - Receives OTLP from Bifrost
  #  - Exports traces/metrics/logs to ClickHouse
  # ─────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command:
      - "--config=/etc/otelcol-config.yaml"
    env_file:
      - ./opentelemetry/.env
    volumes:
      - ./opentelemetry/otel-collector-config.yaml:/etc/otelcol-config.yaml
    ports:
      - "4317:4317"          # OTLP gRPC
      - "4318:4318"          # OTLP HTTP
      - "8888:8888"          # Collector self-metrics
      - "13133:13133"        # Health check
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # ClickHouse - Telemetry Database
  # ─────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"          # HTTP interface (REST API)
      - "9000:9000"          # Native TCP interface
      - "9009:9009"          # Inter-server replication
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - CLICKHOUSE_DB=otel
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # Meridian - Claude Max OAuth → Anthropic API proxy
  # ─────────────────────────────────────────────
  meridian:
    image: ghcr.io/rynfar/meridian:latest
    container_name: meridian
    ports:
      - "${MERIDIAN_PORT:-3456}:3456"
    env_file:
      - ./meridian/.env
    volumes:
      - ~/.claude:/home/claude/.claude:ro
      - meridian-config:/home/claude/.config/meridian
      - meridian-data:/home/claude/.local/share/meridian
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3456/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────
  # Headroom - AI Context Compression Proxy
  # ─────────────────────────────────────────────
  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    container_name: headroom
    command: ["--host", "0.0.0.0", "--port", "8787"]
    environment:
      - HEADROOM_HOST=0.0.0.0
      - HEADROOM_PORT=8787
      - OPENAI_TARGET_API_URL=http://bifrost:8080
      - HEADROOM_LOG_LEVEL=${HEADROOM_LOG_LEVEL:-info}
      - HEADROOM_TELEMETRY=${HEADROOM_TELEMETRY:-off}
    ports:
      - "${HEADROOM_PORT:-8787}:8787"
    depends_on:
      bifrost:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  bifrost-data:
  clickhouse-data:
  meridian-data:
  meridian-config:
